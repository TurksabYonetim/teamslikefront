<svg width="640" height="160" viewBox="0 0 640 160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Teamslike logo</title>
  <desc id="desc">Modern blue Teamslike wordmark with a rounded chat icon.</desc>
  <defs>
    <linearGradient id="tlPrimary" x1="24" y1="20" x2="116" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="0.5" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="tlAccent" x1="52" y1="42" x2="103" y2="99" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EFF6FF"/>
      <stop offset="1" stop-color="#BFDBFE"/>
    </linearGradient>
    <filter id="softShadow" x="0" y="0" width="160" height="160" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#2563EB" flood-opacity="0.16"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <rect x="24" y="24" width="112" height="112" rx="30" fill="url(#tlPrimary)"/>
    <path d="M55 50h50c7.2 0 13 5.8 13 13v27c0 7.2-5.8 13-13 13H78.5L61 116v-13h-6c-7.2 0-13-5.8-13-13V63c0-7.2 5.8-13 13-13Z" fill="white" fill-opacity="0.18"/>
    <path d="M60 70h26" stroke="white" stroke-width="7" stroke-linecap="round"/>
    <path d="M60 88h37" stroke="white" stroke-width="7" stroke-linecap="round"/>
  </g>

  <text x="164" y="96"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="56" font-weight="750" letter-spacing="-1.8" fill="#172554">Teams</text>
  <text x="338" y="96"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="56" font-weight="750" letter-spacing="-1.8" fill="#2563EB">like</text>
  <circle cx="466" cy="92" r="5" fill="#0EA5E9"/>
  <text x="166" y="121"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="14" font-weight="500" letter-spacing="0.22em" fill="#64748B">MEET  CHAT  COLLABORATE</text>
</svg>
