name: Deploy to GitHub Pages

# web/ altındaki Vite SPA'sını derleyip GitHub Pages'e yayınlar.
# Yayın adresi: https://turksabyonetim.github.io/teamslikefront/

on:
  push:
    branches: [master]
  workflow_dispatch:

# Pages'e deploy için gereken izinler
permissions:
  contents: read
  pages: write
  id-token: write

# Aynı anda tek deploy; devam eden run'ı iptal etme (yarım yayını önlemek için)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        # base path Vite'a env ile verilir (vite.config.ts bunu okur).
        # Sondaki "/" zorunlu — asset URL'leri ve router basename buna dayanır.
        env:
          VITE_BASE_PATH: /teamslikefront/
        run: npm run build

      - name: Add SPA fallback (404.html)
        # createBrowserRouter ile derin linkler (ör. /teamslikefront/settings)
        # doğrudan açıldığında Pages 404 döndürür. index.html kopyası SPA'yı
        # yükler, router doğru route'u eşler.
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
